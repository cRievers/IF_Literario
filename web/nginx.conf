# web/nginx.conf
# Serve SPA React com fallback para index.html e proxy opcional para a API

server {
    listen __PORT__;

    root /usr/share/nginx/html;
    index index.html;

    # Compressão gzip para assets estáticos
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Cache agressivo para assets com hash no nome (ex: main.abc123.js)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — toda rota desconhecida serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
